<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <h1>L Game</h1>
    <div id="score">Human: <span id="human-score">0</span> &mdash; Bot: <span id="bot-score">0</span></div>
    <div id="status">Loading...</div>
    <svg id="board" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="controls">
      <button id="undo-btn" disabled>Undo</button>
      <button id="done-btn" disabled>Done</button>
      <button id="new-game-btn">New Game</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
